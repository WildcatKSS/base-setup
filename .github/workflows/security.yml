name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  security-baseline:
    name: Security Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed env files
        run: |
          if find . -name ".env" -o -name ".env.local" -o -name ".env.production" | grep -q .; then
            echo "Committed environment file found."
            exit 1
          fi
          echo "No committed env files found."

      - name: Dependency audit placeholder
        run: |
          echo "Enable npm audit / pnpm audit after package manager is selected."

      - name: SAST placeholder
        run: |
          echo "Enable CodeQL or SAST after language/framework is finalized."
